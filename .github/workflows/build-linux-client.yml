name: build-linux-client

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  build:
    name: Build FiveM five release for Wine
    runs-on: windows-2022
    timeout-minutes: 350
    env:
      PROGRAM: five
      GYP_MSVS_VERSION: '2022'
      npm_config_msvs_version: '2022'
    steps:
      - name: Checkout wine-win10 to C-drive
        shell: bash
        run: |
          mkdir -p /c/b && cd /c/b
          git init .
          git config core.symlinks true
          git remote add origin https://github.com/seltonmt012/fivem.git
          git pull origin wine-win10 --depth=1
          git submodule update --jobs=8 --init --depth=1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Windows 11 SDK 10.0.22000.0 (required by fxd gen projects)
        shell: pwsh
        run: |
          $vsInstaller = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe"
          $vsPath = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise"
          Write-Host "Adding Windows11SDK.22000 component..."
          $p = Start-Process -FilePath $vsInstaller -ArgumentList @(
            "modify","--installPath","`"$vsPath`"",
            "--add","Microsoft.VisualStudio.Component.Windows11SDK.22000",
            "--quiet","--norestart","--force","--nocache"
          ) -Wait -PassThru
          Write-Host "vs_installer exit code: $($p.ExitCode)"
          # verify
          $sdk = "C:\Program Files (x86)\Windows Kits\10\Include\10.0.22000.0"
          if (Test-Path $sdk) { Write-Host "SDK 22000 present: $sdk" } else { Write-Host "WARNING: SDK 22000 not found after install"; Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\Include' | Select-Object Name }

      - name: Setup MSVC developer environment (adds MSBuild + VSINSTALLDIR for node-gyp)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Generate and build five release
        shell: bash
        run: |
          cd /c/b
          python -m pip install setuptools || py -m pip install setuptools || true
          pwsh ./fxd.ps1 get-chrome
          ./prebuild.cmd
          pwsh ./fxd.ps1 gen -game five
          cd code/build/five
          MSBuild.exe CitizenMP.sln -t:build -restore -p:RestorePackagesConfig=true -p:preferredtoolarchitecture=x64 -p:configuration=release -maxcpucount:4 -v:m -fl1 "-flp1:logfile=errors.log;errorsonly" || { echo '=== errors.log ==='; cat errors.log 2>/dev/null | tail -80; exit 1; }

      - name: List build output
        if: always()
        shell: bash
        run: |
          echo "=== code/bin/five ==="
          ls -la /c/b/code/bin/five 2>/dev/null || echo "no bin/five"
          echo "=== release listing ==="
          ls /c/b/code/bin/five/release 2>/dev/null | head -80 || echo "no release dir"

      - name: Upload client artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fivem-five-release
          path: 'C:\b\code\bin\five\release'
          if-no-files-found: warn
          retention-days: 7
